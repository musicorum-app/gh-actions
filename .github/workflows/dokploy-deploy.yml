name: Build and deploy

on:
  workflow_call:
    inputs:
      image_name:
        required: false
        type: string
    secrets:
      DOKPLOY_URL:
        required: true
      DOKPLOY_STAGING_API_KEY:
        required: true
      DOKPLOY_STAGING_APP_ID:
        required: true
      DOKPLOY_PRODUCTION_API_KEY:
        required: true
      DOKPLOY_PRODUCTION_APP_ID:
        required: true

env:
  IMAGE_NAME: ${{ inputs.image_name || github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Container registry login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Staging deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Trigger Dokploy deploy (Staging) & Wait
        uses: thinesjs/dokploy-deployer-action@v1
        with:
          dokploy_url: ${{ secrets.DOKPLOY_URL }}
          api_key: ${{ secrets.DOKPLOY_STAGING_API_KEY }}
          type: application
          application_id: ${{ secrets.DOKPLOY_STAGING_APP_ID }}
          wait_for_deployment: true

  deploy-production:
    name: Production deploy
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Container registry login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote image to production tag
        run: |
          docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest
          docker tag ghcr.io/${{ env.IMAGE_NAME }}:latest ghcr.io/${{ env.IMAGE_NAME }}:production
          docker push ghcr.io/${{ env.IMAGE_NAME }}:production

      - name: Trigger Dokploy (Production) & Wait
        uses: thinesjs/dokploy-deployer-action@v1
        with:
          dokploy_url: ${{ secrets.DOKPLOY_URL }}
          api_key: ${{ secrets.DOKPLOY_PRODUCTION_API_KEY }}
          type: application
          application_id: ${{ secrets.DOKPLOY_PRODUCTION_APP_ID }}
          wait_for_deployment: true
