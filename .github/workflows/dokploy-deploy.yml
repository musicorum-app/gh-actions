name: Build and deloy

on:
  workflow_call:
    inputs:
      image_name:
        required: false
        type: string
    secrets:
      DOKPLOY_URL:
        required: true
      DOKPLOY_STAGING_API_KEY:
        required: true
      DOKPLOY_STAGING_APP_ID:
        required: true
      DOKPLOY_PRODUCTION_API_KEY:
        required: true
      DOKPLOY_PRODUCTION_APP_ID:
        required: true

env:
  IMAGE_NAME: ${{ inputs.image_name || github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Container registry login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest

  deploy-staging:
    name: Staging deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy deploy (Staging)
        run: |
          curl -X 'POST' \
            '${{ secrets.DOKPLOY_URL }}/api/application.deploy' \
            -H 'Accept: application/json' \
            -H 'Content-Type: application/json' \
            -H "X-API-KEY: ${{ secrets.DOKPLOY_STAGING_API_KEY }}" \
            -d '{ "applicationId": "${{ secrets.DOKPLOY_STAGING_APP_ID }}" }'

  deploy-production:
    name: Production deploy
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Container registry login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote image to production tag
        run: |
          docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest
          docker tag ghcr.io/${{ env.IMAGE_NAME }}:latest ghcr.io/${{ env.IMAGE_NAME }}:production
          docker push ghcr.io/${{ env.IMAGE_NAME }}:production

      - name: Trigger Dokploy (Produção)
        run: |
          curl -X 'POST' \
            '${{ secrets.DOKPLOY_URL }}/api/application.deploy' \
            -H 'Accept: application/json' \
            -H 'Content-Type: application/json' \
            -H "X-API-KEY: ${{ secrets.DOKPLOY_PRODUCTION_API_KEY }}" \
            -d '{ "applicationId": "${{ secrets.DOKPLOY_PRODUCTION_APP_ID }}" }'
